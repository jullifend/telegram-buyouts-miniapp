<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Бронь выкупа</title>
  <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <p class="eyebrow">Мини-приложение</p>
        <h1>Выберите доступный артикул</h1>
        <p class="muted">Свободные места обновляются каждый день после 00:00. После выбора бронь держится 50 минут.</p>
      </div>
      <button id="refreshBtn" class="ghost-btn" type="button">Обновить</button>
    </section>

    <section id="completedMessage" class="hidden"></section>

    <section id="activeReservation" class="hidden"></section>

    <section id="products" class="products"></section>

    <section id="instruction" class="instruction hidden"></section>

    <div id="toast" class="toast hidden"></div>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
